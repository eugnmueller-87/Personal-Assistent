name: Weekly Review Reminder

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create weekly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = '${{ steps.date.outputs.date }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Review — ${date}`,
              labels: ['weekly-review'],
              body: `# Weekly Review — ${date}

## Checklist

- [ ] Review all open issues and close anything done
- [ ] Update [TODO.md](../blob/main/TODO.md) — reprioritize Now / Next / Backlog
- [ ] Check [ROADMAP.md](../blob/main/ROADMAP.md) — are we on track with the phases?
- [ ] Review each active project in [projects/](../blob/main/projects/)
- [ ] Set top 3 priorities for this week
- [ ] Any new projects or workflows to document?

## This week's top 3 priorities

1.
2.
3.

## Notes

_Add anything notable from the past week here._

---
*Auto-generated by GitHub Actions every Monday.*`
            });
