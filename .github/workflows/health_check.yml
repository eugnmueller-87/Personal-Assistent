name: ICARUS Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        id: ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.RAILWAY_URL }}/health" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check: $STATUS"

      - name: Alert on failure
        if: steps.ping.outputs.status != '200'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="ICARUS health check FAILED (HTTP ${{ steps.ping.outputs.status }}). Bot may be down."
