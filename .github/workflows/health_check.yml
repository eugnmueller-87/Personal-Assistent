name: ICARUS Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        id: ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.RAILWAY_URL }}/health" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check: $STATUS"

      - name: Log result
        run: |
          if [ "${{ steps.ping.outputs.status }}" = "200" ]; then
            echo "ICARUS is healthy."
          else
            echo "ICARUS health check failed (HTTP ${{ steps.ping.outputs.status }}). Check Railway dashboard."
          fi
