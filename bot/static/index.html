<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ICARUS</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- PIN Login -->
  <div id="login-screen">
    <div class="login-box">
      <div class="logo-ring">
        <svg viewBox="0 0 80 80" fill="none">
          <circle cx="40" cy="40" r="36" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 4"/>
          <circle cx="40" cy="40" r="26" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
          <text x="40" y="46" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="system-ui" letter-spacing="2">ICARUS</text>
        </svg>
      </div>
      <p class="login-label">Enter PIN</p>
      <div class="pin-dots" id="pin-dots">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="pin-pad">
        <button class="pin-key" data-d="1">1</button>
        <button class="pin-key" data-d="2">2</button>
        <button class="pin-key" data-d="3">3</button>
        <button class="pin-key" data-d="4">4</button>
        <button class="pin-key" data-d="5">5</button>
        <button class="pin-key" data-d="6">6</button>
        <button class="pin-key" data-d="7">7</button>
        <button class="pin-key" data-d="8">8</button>
        <button class="pin-key" data-d="9">9</button>
        <button class="pin-key pin-clear" data-d="clear">⌫</button>
        <button class="pin-key" data-d="0">0</button>
        <button class="pin-key pin-empty" disabled></button>
      </div>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-screen" class="hidden">
    <header>
      <div class="header-logo">
        <div class="status-dot"></div>
        <span>ICARUS</span>
      </div>
      <button id="btn-logout" title="Logout">⏻</button>
    </header>

    <div id="messages"></div>

    <div id="typing-indicator" class="hidden">
      <div class="bubble bot">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

    <footer>
      <button id="btn-photo" title="Send photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="15" rx="2"/>
          <circle cx="12" cy="13" r="3"/>
          <path d="M9 5l1.5-2h3L15 5"/>
        </svg>
      </button>
      <input type="text" id="msg-input" placeholder="Message ICARUS…" autocomplete="off" />
      <button id="btn-mic" title="Voice message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
        </svg>
      </button>
      <button id="btn-send" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden" />
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
